    <!-- Fonts: Fraunces (italic hero), Inter (body), JetBrains Mono (eyebrow) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        /* === Design tokens (v9 — 墨与月 + 光谱) =================================== */
        :root {
            /* Moon (light surfaces) */
            --moon-bright: #FAF6EC;
            --moon-yue:    #EFEAE2;
            --moon-paper:  #ECE6D8;
            --moon-mid:    #9A93A0;
            --moon-low:    #5E5764;

            /* Ink (dark surfaces) */
            --ink-jiao:  #08070A;
            --ink-mo:    #0D0B10;
            --ink-nong:  #14111A;
            --ink-zhong: #1B171F;

            /* Prism (used ONCE as a 1px chromatic underline accent — see .prism-rule) */
            --prism-deep:  #5A6B9E;
            --prism-rose:  #B56EA3;
            --prism-amber: #D79A5C;

            /* Light-mode semantic defaults */
            --bg:           var(--moon-yue);
            --surface:      var(--moon-bright);
            --text:         var(--ink-nong);
            --text-mid:     var(--moon-low);
            --text-low:     var(--moon-mid);
            --hairline:     rgba(0, 0, 0, 0.08);
            --hairline-bold:rgba(0, 0, 0, 0.16);
            --cta-bg:       var(--ink-nong);
            --cta-text:     var(--moon-bright);

            /* Typography */
            --font-serif: 'Fraunces', Georgia, 'Times New Roman', serif;
            --font-sans:  'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --font-mono:  'JetBrains Mono', 'SF Mono', Menlo, monospace;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg:           var(--ink-mo);
                --surface:      var(--ink-nong);
                --text:         var(--moon-yue);
                --text-mid:     var(--moon-mid);
                --text-low:     var(--moon-low);
                --hairline:     rgba(255, 255, 255, 0.07);
                --hairline-bold:rgba(255, 255, 255, 0.14);
                --cta-bg:       var(--moon-yue);
                --cta-text:     var(--ink-mo);
            }
        }

        /* === Reset =============================================================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

        /* === Page ================================================================ */
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            font-size: 17px;
            line-height: 1.55;
            display: grid;
            place-items: center;
            padding: 48px 24px;
        }

        .frame {
            width: 100%;
            max-width: 880px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 28px;
        }

        /* === Logo ================================================================ */
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 18px;
            display: block;
        }

        /* === Eyebrow ============================================================= */
        .eyebrow {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-mid);
        }

        /* === Hero ================================================================ */
        h1 {
            font-family: var(--font-serif);
            font-style: italic;
            font-weight: 500;
            font-size: clamp(36px, 6.5vw, 56px);
            line-height: 1.15;
            letter-spacing: -0.015em;
            color: var(--text);
            max-width: 820px;
        }

        /* === Subhead ============================================================= */
        .subhead {
            font-family: var(--font-sans);
            font-size: 17px;
            line-height: 1.6;
            color: var(--text-mid);
            max-width: 440px;
        }

        /* === CTA ================================================================= */
        .cta-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            margin-top: 8px;
        }

        .cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--cta-bg);
            color: var(--cta-text);
            text-decoration: none;
            font-family: var(--font-sans);
            font-size: 16px;
            font-weight: 600;
            padding: 14px 24px;
            border-radius: 999px;
            min-height: 44px;
            transition: transform 120ms ease-out, box-shadow 120ms ease-out;
        }
        .cta:hover  { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12); }
        .cta:active { transform: translateY(0); }

        .cta svg { width: 18px; height: 18px; fill: currentColor; }

        /* === Footer ============================================================== */
        footer {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 24px;
            font-family: var(--font-sans);
            font-size: 13px;
            color: var(--text-low);
        }
        footer a {
            color: var(--text-low);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: color 120ms, border-color 120ms;
        }
        footer a:hover {
            color: var(--text-mid);
            border-bottom-color: var(--hairline-bold);
        }
        footer .sep { color: var(--text-low); opacity: 0.6; }

        /* Tighten on small screens */
        @media (max-width: 480px) {
            body { padding: 32px 20px 96px; }
            footer { gap: 16px; font-size: 12px; }
        }
    </style>
</head>

</body>
</html>
